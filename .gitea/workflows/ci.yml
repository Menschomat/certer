name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    if: github.server_url != 'https://github.com'
    steps:
      - name: Cleanup Disk Space
        run: |
          docker system prune -f || true
          docker image prune -f || true
          df -h
          
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.x'
          cache: false

      - name: Download dependencies
        run: go mod download

      - name: Run Tests
        run: go test -race -v ./...

      - name: Import Secrets from Vault
        id: import-secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          namespace: dev
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            certer/secret/data/cicd/registry username | REGISTRY_USERNAME ;
            certer/secret/data/cicd/registry password | REGISTRY_PASSWORD

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: registry.dmz.k8s.menscho.space
          username: ${{ steps.import-secrets.outputs.REGISTRY_USERNAME }}
          password: ${{ steps.import-secrets.outputs.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image (Multi-Platform)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: registry.dmz.k8s.menscho.space/m0space/certer:latest
          cache-from: type=registry,ref=registry.dmz.k8s.menscho.space/m0space/certer:latest
